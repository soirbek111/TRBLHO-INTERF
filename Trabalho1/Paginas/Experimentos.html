<!DOCTYPE html>
<html lang="pt-br">

<body id="topo-exp">

        <nav>
            <a href="../index.html" ...>Início</a>
            <a href="Personagens.html">Personagens</a>
            <a href="Experimentos.html">Experimentos</a>
        </nav>
    </header>
    <main class="container">
        <h1>Área de Experimentos</h1>
        
        <video controls><source src="../Videos/Rick & Morty - Temporada 9  Trailer Oficial  HBO Max - HBO Max Brasil (1080p, h264, youtube).mp4" type="video/mp4"></video>
        <audio controls><source src="../Audios/tema-evil-morty.mp3" type="audio/mpeg">
        </audio>

        <hr>

        <form action="#">
            <fieldset>
                <legend>Registro de Espécime</legend>
                <label>Nome: <input type="text"></label><br>
                <label>Email: <input type="email"></label><br>
                <label>Senha: <input type="password"></label><br>
                <label>Data: <input type="date"></label><br>
                <label>Cor do Sangue: <input type="color"></label><br>
                
                <p>Status Vital (OBRIGATÓRIO):</p>
                <input type="radio" name="st" required> Vivo 
                <input type="radio" name="st"> Morto 
                <input type="radio" name="st"> Clone

                <p>Habilidades (OBRIGATÓRIO):</p>
                <input type="checkbox" required> Voo 
                <input type="checkbox"> Telepatia

                <label>Nível de Perigo: <input type="range"></label><br>
                <label>DNA: <input type="file"></label><br>
                
                <button type="submit">Enviar</button>
                <button type="reset">Resetar</button>
            </fieldset>
        </form>
        <a href="#topo-exp">↑ Voltar ao Topo</a>
